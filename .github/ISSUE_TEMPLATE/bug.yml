name: Bug (infra / CI / internal tooling only)
description: For infrastructure or CI bugs. Customer-facing bugs go in Plane.
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        ⚠️ **Customer-facing product bugs go in Plane, not here.**
        Use this template only for infrastructure, CI, or internal tooling issues.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Steps to reproduce, what you saw vs. what you expected.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error messages
      render: shell

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - "P0 — production blocked, can't deploy"
        - "P1 — broken workflow, has workaround"
        - "P2 — annoying but not blocking"
        - "P3 — minor / nice to fix"
      default: 2
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: e.g. CI on main, local dev, Dokploy staging