name: Audit direct pushes to main

on:
  workflow_call:
    secrets:
      ALERT_EMAIL_TO:
        required: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Check if push came from a merged PR
        uses: actions/github-script@v7
        with:
          script: |
            // Bot accounts are allowed to push directly (e.g. for runbook auto-commits)
            const allowedActors = ['planetpulse-bot', 'dependabot[bot]'];
            if (allowedActors.includes(context.actor)) {
              core.info(`Push by ${context.actor} — allowed actor, skipping audit.`);
              return;
            }

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });

            const merged = prs.data.find(p => p.merged_at !== null);
            if (merged) {
              core.info(`Commit came from merged PR #${merged.number}. OK.`);
              return;
            }

            const sha = context.sha.slice(0, 7);
            const message = (context.payload.head_commit?.message || '(no message)').split('\n')[0];

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Direct push to main: ${sha}`,
              body: [
                `**Author:** @${context.actor}`,
                `**Commit:** ${message}`,
                `**SHA:** \`${context.sha}\``,
                `**Pushed at:** ${new Date().toISOString()}`,
                ``,
                `This commit was pushed directly to \`main\` without going through a pull request.`,
                `Post-hoc review required by @planetpulse-esg/eng-leads.`,
                ``,
                `If this was intentional (e.g. critical hotfix), close this issue with a comment explaining why.`,
              ].join('\n'),
              labels: ['process-violation'],
            });

            core.setFailed('Direct push to main detected — issue opened for review.');